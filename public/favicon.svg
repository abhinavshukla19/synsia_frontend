<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fav-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>

  <!-- full background -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#020617" stroke="#111827" stroke-width="1.5" />

  <!-- big S circle -->
  <circle cx="32" cy="32" r="20" fill="#020617" stroke="url(#fav-accent)" stroke-width="2" />

  <!-- large S letter (high contrast, centered) -->
  <text
    x="32"
    y="38"
    text-anchor="middle"
    fill="#e5e7eb"
    font-size="30"
    font-weight="700"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  >
    S
  </text>
</svg>

