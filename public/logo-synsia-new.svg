<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="synsia-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>

  <!-- background pill -->
  <rect x="4" y="10" width="312" height="60" rx="18" fill="#020617" stroke="#1f2937" stroke-width="1" />

  <!-- mark -->
