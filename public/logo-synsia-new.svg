    <rect x="0" y="0" width="44" height="44" rx="14" fill="#020617" stroke="url(#synsia-accent)" stroke-width="1.6" />

    <!-- top bar -->
    <rect x="8" y="9" width="28" height="5" rx="2.5" fill="#0b1120" />
    <circle cx="13" cy="11.5" r="1.6" fill="#f97316" />
    <circle cx="19" cy="11.5" r="1.6" fill="#eab308" />
    <circle cx="25" cy="11.5" r="1.6" fill="#22c55e" />

    <!-- text lines -->
    <rect x="10" y="19" width="24" height="2.6" rx="1.3" fill="#1f2937" />
    <rect x="10" y="24" width="20" height="2.6" rx="1.3" fill="#111827" />
    <rect x="10" y="29" width="22" height="2.6" rx="1.3" fill="#111827" />

    <!-- stylised S -->
    <path
      d="M31.8 38.2c-3.1 0-5.7-1.7-5.7-4.4 0-2.7 2-3.8 4.6-4.4l2.1-.5c1.6-.4 2.4-.9 2.4-1.8 0-1.2-1.1-1.9-2.8-1.9-1.8 0-3.1.8-3.5 2.1l-2.9-.7c.7-2.3 2.9-4.4 6.3-4.4 3.6 0 6 1.9 6 4.7 0 2.6-1.7 3.7-4.6 4.4l-2.1.5c-1.6.4-2.4.9-2.4 1.9 0 1.2 1.1 1.9 2.9 1.9 1.6 0 2.9-.7 3.4-1.9l2.9.7c-.8 2.4-3.1 4-6.6 4z"
      fill="#e5e7eb"
    />
  </g>

  <!-- wordmark -->
  <g transform="translate(90,35)">
    <text
      x="0"
      y="0"
      fill="#e5e7eb"
      font-size="24"
      font-weight="600"
      letter-spacing="0.08em"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    >
      SYNSIA
    </text>
  </g>

  <!-- tagline -->
  <g transform="translate(90,52)">
    <text
      x="0"
      y="0"
      fill="#9ca3af"
      font-size="11"
      letter-spacing="0.18em"
